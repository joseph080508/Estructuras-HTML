<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form action="#" method="post">
    <div>
        <label for="password">Contraseña</label>
        <input id="password" type="password" name="password">

    </div>

    <div>
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" min="18" max="70">
    </div>

    <div>
        <label for="fecha">Fecha:</label>
        <input type="date" id="fecha" name="fecha">
    </div>

    <div>
        <label for="color">color:</label>
        <input type="color" id="color" name="color">
    </div>

    <fieldset>
        <legend>genero</legend>
        <input type="radio" name="genero" id="masculino" value="m">
        <label for="masculino">masculino</label>

        <input type="radio" name="genero" id="femenino" value="f">
        <label for="femenino">femenino</label>

        <input type="radio" name="genero" id="Otro" value="o">
        <label for="Otro">Otro</label>
    </fieldset>
    
    <fieldset>
        <legend>intereses:</legend>
        <input type="checkbox" name="intereses" id="deportes" value="deportes">
        <label for="deportes">deportes</label>

        <input type="checkbox" name="intereses" id="musica" value="musica">
        <label for="musica">musica</label>
    </fieldset>

    <div>
        <label for="pais">pais</label>
        <select name="pais" id="pais">
            <option value="mexico">mexico</option>
            <option value="colombia">colombia</option>
            <option value="argentina">argentina</option>
        </select>
    </div>


    </form>
</body>
</html>
